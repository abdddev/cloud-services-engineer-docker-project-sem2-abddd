services:
  backend:
    build:
      context: ./backend
    ports:
      - "8081:8081"
    networks:
      - momo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VUE_APP_API_URL: ${VUE_APP_API_URL:-http://localhost:8081}
    ports:
      - "80:80"
    networks:
      - momo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/momo-store/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy

networks:
  momo-net:
    driver: bridge
