services:
  backend:
    build:
      context: ./backend
    expose:
      - "8081"
    networks:
      - momo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  lb:
    image: nginx:1.27-alpine
    ports:
      - "8081:8081"
    volumes:
      - ./lb/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - momo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /var/log/nginx
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 32M

  frontend:
    build:
      context: ./frontend
      args:
        VUE_APP_API_URL: ${VUE_APP_API_URL:-http://localhost:8081}
    ports:
      - "80:80"
    networks:
      - momo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/momo-store/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      lb:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /var/log/nginx
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

networks:
  momo-net:
    driver: bridge
    internal: true
